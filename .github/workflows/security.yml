name: Security & Compliance

on: [push, pull_request]

jobs:
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for Secrets
        uses: gitleaks/gitleaks-action@v2

  beneficiary-check:
    name: Beneficiary Clause Protection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Beneficiary Clause
        run: |
          if ! grep -r "© Ervin Remus Radosavlevici" LICENSE; then
            echo "::error::Beneficiary clause altered in LICENSE."
            exit 1
          fi
          if ! grep -r "© Ervin Remus Radosavlevici" legal/NDA.md; then
            echo "::error::Beneficiary clause altered in NDA."
            exit 1
          fi

  license-compliance:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check License in Files
        run: |
          for file in $(find . -type f -name "*.md"); do
            if ! grep -q "© Ervin Remus Radosavlevici" "$file"; then
              echo "::warning::Missing beneficiary notice in $file"
            fi
          done